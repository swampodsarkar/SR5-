<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2300ffcc' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><line x1='6' y1='12' x2='10' y2='12'></line><line x1='8' y1='10' x2='8' y2='14'></line><line x1='15' y1='13' x2='15.01' y2='13'></line><line x1='18' y1='11' x2='18.01' y2='11'></line><path d='M2 12C2 17.52 6.48 22 12 22C17.52 22 22 17.52 22 12C22 6.48 17.52 2 12 2C6.48 2 2 6.48 2 12Z'></path></svg>" />
    <title>SR5</title>
    <script>
      // Disable Context Menu
      document.addEventListener('contextmenu', event => event.preventDefault());

      // Disable DevTools shortcuts
      document.addEventListener('keydown', function (e) {
        if (e.key === 'F12' || e.keyCode === 123) { e.preventDefault(); }
        if ((e.ctrlKey || e.metaKey) && e.shiftKey && (e.key === 'I' || e.key === 'i' || e.key === 'J' || e.key === 'j' || e.key === 'C' || e.key === 'c')) { e.preventDefault(); }
        if ((e.ctrlKey || e.metaKey) && (e.key === 'U' || e.key === 'u' || e.key === 'S' || e.key === 's')) { e.preventDefault(); }
      });
    </script>
  </head>
  <body>
    <div id="root">
      <!-- Pre-loader shown while React loads -->
      <style>
        #preloader {
          position: fixed; inset: 0; z-index: 999999;
          background: #000;
          display: flex; flex-direction: column; align-items: center; justify-content: center;
          font-family: ui-monospace, monospace;
          animation: fadeOut 0.5s ease 3s forwards;
        }
        @keyframes fadeOut { to { opacity: 0; pointer-events: none; } }
        #preloader .logo {
          display: flex; align-items: flex-end; gap: 3px; height: 40px; margin-bottom: 24px;
        }
        #preloader .logo .bar {
          width: 6px; border-radius: 4px;
          animation: wave 0.8s ease-in-out infinite alternate;
        }
        #preloader .logo .bar:nth-child(1) { background: #3b82f6; height: 16px; animation-delay: 0.0s; }
        #preloader .logo .bar:nth-child(2) { background: #6366f1; height: 28px; animation-delay: 0.1s; }
        #preloader .logo .bar:nth-child(3) { background: #8b5cf6; height: 36px; animation-delay: 0.2s; }
        #preloader .logo .bar:nth-child(4) { background: #06b6d4; height: 40px; animation-delay: 0.3s; }
        #preloader .logo .bar:nth-child(5) { background: #3b82f6; height: 32px; animation-delay: 0.4s; }
        #preloader .logo .bar:nth-child(6) { background: #6366f1; height: 22px; animation-delay: 0.5s; }
        #preloader .logo .bar:nth-child(7) { background: #8b5cf6; height: 12px; animation-delay: 0.6s; }
        @keyframes wave {
          0% { transform: scaleY(0.6); opacity: 0.3; }
          100% { transform: scaleY(1); opacity: 1; }
        }
        #preloader .title {
          font-size: 32px; font-weight: 300; letter-spacing: 0.18em; text-transform: uppercase;
          color: #fff; margin-bottom: 20px;
        }
        #preloader .dot-loader {
          display: flex; gap: 6px;
        }
        #preloader .dot-loader span {
          width: 6px; height: 6px; border-radius: 50%;
          background: #3b82f6;
          animation: pulse 1.2s ease-in-out infinite;
        }
        #preloader .dot-loader span:nth-child(2) { animation-delay: 0.2s; }
        #preloader .dot-loader span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes pulse {
          0%, 100% { opacity: 0.15; transform: scale(0.8); }
          50% { opacity: 1; transform: scale(1); }
        }
      </style>
      <div id="preloader">
        <div class="logo">
          <div class="bar"></div><div class="bar"></div><div class="bar"></div>
          <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
        </div>
        <div class="title">SR5 Console</div>
        <div class="dot-loader"><span></span><span></span><span></span></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
