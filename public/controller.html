<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
  <title>SR5 Controller</title>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { background: #07070a; color: #fff; font-family: system-ui, sans-serif; height: 100dvh; height: 100svh; overflow: hidden; touch-action: none; user-select: none; }
    .container { height: 100dvh; height: 100svh; display: flex; flex-direction: column; max-width: 500px; margin: 0 auto; padding: 8px 12px; }

    .header { display: flex; justify-content: space-between; align-items: center; padding: 4px; flex-shrink: 0; }
    .status { display: flex; align-items: center; gap: 6px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .dot.on { background: #34d399; box-shadow: 0 0 8px #34d399; }
    .dot.off { background: #444; }
    .tag { font-size: 10px; font-weight: 700; letter-spacing: 1px; }
    .tag.p1 { color: #06b6d4; }
    .tag.p2 { color: #a855f7; }
    .cod { font-family: monospace; font-size: 11px; color: #00ffcc; letter-spacing: 2px; }
    .lat { font-size: 9px; color: #666; font-family: monospace; }
    .tog { display: flex; gap: 4px; }
    .tog button { width: 32px; height: 32px; border-radius: 8px; border: 1px solid #ffffff15; background: #1a1a24; font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .tog button.off { opacity: 0.4; }
    .tog button.red { color: #ef4444; }

    .pad { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 8px; min-height: 0; }

    .dpad { position: relative; width: 160px; height: 160px; background: #111118; border-radius: 50%; border: 3px solid #000; box-shadow: 0 8px 32px #00000080, inset 0 2px 4px #ffffff08; flex-shrink: 0; }
    .dpad-c { position: absolute; inset: 22px; border-radius: 50%; background: #0a0a0f; border: 1px solid #ffffff08; }
    .dpad-btn { position: absolute; background: #1a1a24; border: none; color: #ffffff40; font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 60ms, color 60ms; }
    .dpad-btn.a { background: #00ffcc20; color: #00ffcc; }
    .dpad-up { top: 0; left: 50%; transform: translateX(-50%); width: 60px; height: 38px; border-radius: 0 0 8px 8px; }
    .dpad-down { bottom: 0; left: 50%; transform: translateX(-50%); width: 60px; height: 38px; border-radius: 8px 8px 0 0; }
    .dpad-left { left: 0; top: 50%; transform: translateY(-50%); width: 38px; height: 60px; border-radius: 0 8px 8px 0; }
    .dpad-right { right: 0; top: 50%; transform: translateY(-50%); width: 38px; height: 60px; border-radius: 8px 0 0 8px; }

    .sh { display: flex; gap: 10px; width: 100%; max-width: 280px; flex-shrink: 0; }
    .sh button { flex: 1; padding: 8px; background: #1a1a24; border: 1px solid #ffffff08; border-radius: 8px; color: #ffffff60; font-size: 9px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: background 60ms, color 60ms; }
    .sh button.a { background: #6366f1; color: #fff; }

    .mid { display: flex; align-items: center; gap: 20px; width: 100%; justify-content: center; flex-shrink: 0; }

    .act { position: relative; width: 180px; height: 150px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
    .act-btn { position: absolute; width: 46px; height: 46px; border-radius: 50%; border: 2px solid #ffffff15; font-size: 16px; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 60ms, background 60ms; }
    .act-btn.a { transform: scale(0.88); }
    .by { top: 0; left: 50%; transform: translateX(-50%); background: #1a1a24; color: #10b981; }
    .by.a { background: #10b981; color: #000; box-shadow: 0 0 10px #10b98150; }
    .bx { right: 0; top: 50%; transform: translateY(-50%); background: #1a1a24; color: #3b82f6; }
    .bx.a { background: #3b82f6; color: #000; box-shadow: 0 0 10px #3b82f650; }
    .bb { left: 0; top: 50%; transform: translateY(-50%); background: #1a1a24; color: #f59e0b; }
    .bb.a { background: #f59e0b; color: #000; box-shadow: 0 0 10px #f59e0b50; }
    .ba { bottom: 0; left: 50%; transform: translateX(-50%); background: #1a1a24; color: #ef4444; }
    .ba.a { background: #ef4444; color: #000; box-shadow: 0 0 10px #ef444450; }

    .bot { display: flex; justify-content: center; gap: 28px; padding: 6px 0; flex-shrink: 0; }
    .bot > div { display: flex; flex-direction: column; align-items: center; gap: 3px; }
    .bot button { width: 50px; height: 20px; border-radius: 20px; background: linear-gradient(180deg,#1a1a24,#0d0d14); border: 1px solid #ffffff08; cursor: pointer; }
    .bot button.a { background: linear-gradient(180deg,#cbd5e1,#94a3b8); }
    .bot span { font-size: 7px; color: #ffffff60; font-family: monospace; letter-spacing: 2px; font-weight: 700; }

    .pair { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 14px; text-align: center; padding: 20px; }
    .pair h1 { font-size: 20px; font-weight: 800; }
    .pair .sub { font-size: 10px; color: #ffffff40; font-family: monospace; letter-spacing: 2px; }

    .ptabs { display: flex; gap: 8px; width: 100%; max-width: 300px; }
    .ptabs button { flex: 1; padding: 10px; border-radius: 12px; border: 1px solid #ffffff15; background: #0d0d14; color: #ffffff60; font-size: 11px; font-weight: 700; cursor: pointer; }
    .ptabs button.s1 { background: #06b6d420; border-color: #06b6d460; color: #06b6d4; }
    .ptabs button.s2 { background: #a855f720; border-color: #a855f760; color: #a855f7; }

    .cm { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 300px; }
    .cmq { background: #0d0d14; border: 1px solid #ffffff08; border-radius: 14px; padding: 14px; }
    .cmq button { width: 100%; padding: 12px; border-radius: 10px; border: none; font-size: 12px; font-weight: 700; cursor: pointer; }
    .q1 { background: #06b6d4; color: #000; } .q2 { background: #a855f7; color: #fff; }
    .cmm { background: #0d0d14; border: 1px solid #ffffff08; border-radius: 14px; padding: 14px; }
    .cmm .lbl { font-size: 9px; color: #ffffff40; text-align: left; margin-bottom: 6px; font-family: monospace; font-weight: 700; display: block; }
    .cmm .rw { display: flex; gap: 8px; }
    .cmm input { flex: 1; background: #07070a; border: 1px solid #ffffff15; color: #00ffcc; font-size: 20px; letter-spacing: 6px; text-align: center; padding: 10px; border-radius: 10px; font-family: monospace; text-transform: uppercase; outline: none; }
    .cmm input:focus { border-color: #00ffcc60; }
    .cmm .rw button { padding: 10px 16px; border-radius: 10px; border: none; color: #000; font-weight: 700; font-size: 11px; cursor: pointer; }
    .m1 { background: #06b6d4; } .m2 { background: #a855f7; }

    .scan-o { position: fixed; inset: 0; z-index: 100; background: #000; display: flex; flex-direction: column; }
    .scan-o video { width: 100%; flex: 1; object-fit: cover; }
    .scan-h { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; background: #0a0a0f; }
    .scan-h span { font-size: 12px; font-weight: 600; }
    .scan-h button { background: none; border: none; color: #fff; font-size: 16px; cursor: pointer; padding: 4px 12px; }
    .scan-r { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 200px; height: 200px; border: 2px solid #00ffcc80; border-radius: 16px; box-shadow: 0 0 0 9999px #00000080; pointer-events: none; }
    .scan-r::after { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: #00ffcc; border-radius: 2px; animation: sl 2s ease-in-out infinite; }
    @keyframes sl { 0%,100% { top: 0; } 50% { top: calc(100% - 3px); } }

    @media (max-height: 640px) {
      .dpad { width: 130px; height: 130px; }
      .dpad-c { inset: 18px; }
      .dpad-up, .dpad-down { width: 50px; height: 30px; }
      .dpad-left, .dpad-right { width: 30px; height: 50px; }
      .act { width: 150px; height: 120px; }
      .act-btn { width: 38px; height: 38px; font-size: 13px; }
      .mid { gap: 12px; }
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    const FC = { apiKey: "AIzaSyAeoScw5UK53ElBnNdhtJVAETb3_isOEKs", authDomain: "fram-and-go.firebaseapp.com", databaseURL: "https://fram-and-go-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "fram-and-go", storageBucket: "fram-and-go.firebasestorage.app", messagingSenderId: "781295119002", appId: "1:781295119002:web:4be2d54934395b491c0d23" };
    firebase.initializeApp(FC);
    const db = firebase.database();

    let ap = 1, p1 = { c: '', on: false, pr: {} }, p2 = { c: '', on: false, pr: {} }, p3 = { c: '', on: false, pr: {} }, p4 = { c: '', on: false, pr: {} };
    let snd = true, vib = true, scan = false, str = null, si = null;
    const PL = [p1, p2, p3, p4];

    function gp(n) { return PL[n - 1] || p1; }

    let ac = null;
    function clk() {
      if (!snd) return;
      try {
        if (!ac) ac = new (window.AudioContext || window.webkitAudioContext)();
        if (ac.state === 'suspended') ac.resume();
        const o = ac.createOscillator(), g = ac.createGain();
        o.type = 'sine'; o.frequency.setValueAtTime(150, ac.currentTime); o.frequency.exponentialRampToValueAtTime(300, ac.currentTime + 0.04);
        g.gain.setValueAtTime(0.3, ac.currentTime); g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.04);
        o.connect(g); g.connect(ac.destination); o.start(); o.stop(ac.currentTime + 0.04);
      } catch (e) {}
    }
    function vibf() { if (vib && navigator.vibrate) navigator.vibrate(20); }

    function sb(pn, btn, st) {
      const p = gp(pn);
      if (!p.c || !p.on) return;
      const u = {}; u[`controllers/${p.c}/state/${btn}`] = st; u[`controllers/${p.c}/state/lastUpdated`] = Date.now();
      db.ref().update(u).catch(() => {});
    }

    function prs(pn, btn) {
      const p = gp(pn); if (p.pr[btn]) return;
      p.pr[btn] = true; clk(); vibf(); sb(pn, btn, 'down'); r();
    }
    function rel(pn, btn) {
      const p = gp(pn); if (!p.pr[btn]) return;
      p.pr[btn] = false; sb(pn, btn, 'up'); r();
    }
    function tp(pn, btn) {
      return {
        onPointerDown(e) { e.preventDefault(); prs(pn, btn); },
        onPointerUp(e) { e.preventDefault(); rel(pn, btn); },
        onPointerLeave(e) { e.preventDefault(); rel(pn, btn); },
        onPointerCancel(e) { rel(pn, btn); }
      };
    }

    function conn(pn, c) {
      const p = gp(pn); c = c.toUpperCase(); p.c = c;
      const cr = db.ref(`controllers/${c}/connected`), sr = db.ref(`controllers/${c}/state`);
      const init = {}; ['UP','DOWN','LEFT','RIGHT','A','B','X','Y','SELECT','START','L1','R1'].forEach(k => init[k] = 'up');
      init.lastUpdated = Date.now();
      sr.set(init).then(() => {
        cr.set(true); p.on = true; r();
        setInterval(() => { const s = Date.now(); db.ref(`controllers/${c}/ping`).set(s).then(() => { const el = document.getElementById('lt' + pn); if (el) el.textContent = (Date.now() - s) + 'ms'; }); }, 5000);
      }).catch(() => r());
    }
    function disc(pn) {
      const p = gp(pn); if (p.c) { db.ref(`controllers/${p.c}/connected`).set(null); db.ref(`controllers/${p.c}/state`).set(null); }
      p.on = false; p.c = ''; p.pr = {}; r();
    }

    function startScan(pn) {
      if (scan) return; scan = true;
      document.getElementById('app').innerHTML = `
        <div class="scan-o">
          <div class="scan-h"><span>Player ${pn} — Scan QR</span><button onclick="stopScan()">✕</button></div>
          <div style="position:relative;flex:1;overflow:hidden"><video id="qv" autoplay playsinline muted></video><div class="scan-r"></div></div>
          <div style="padding:12px;text-align:center;font-size:11px;color:#ffffff60">Point camera at QR code on console</div>
        </div>`;
      const v = document.getElementById('qv');
      const ca = document.createElement('canvas'), cx = ca.getContext('2d');
      navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width: 640, height: 480 } }).then(s => {
        str = s; v.srcObject = s; v.play();
        si = setInterval(() => {
          if (v.readyState !== 4) return;
          ca.width = v.videoWidth; ca.height = v.videoHeight; cx.drawImage(v, 0, 0, ca.width, ca.height);
          const r = jsQR(cx.getImageData(0, 0, ca.width, ca.height).data, ca.width, ca.height);
          if (r && r.data) {
            let code = '';
            const m = r.data.match(/[?&]code=([A-Z0-9]{6})/i);
            if (m) code = m[1].toUpperCase();
            else { const cl = r.data.replace(/[^A-Z0-9]/g, '').toUpperCase(); if (cl.length >= 6) code = cl.substring(0, 6); }
            if (code.length === 6) { stopScan(); conn(pn, code); }
          }
        }, 200);
      }).catch(() => { scan = false; r(); });
    }
    function stopScan() {
      scan = false; if (si) { clearInterval(si); si = null; }
      if (str) { str.getTracks().forEach(t => t.stop()); str = null; } r();
    }

    function sw(pn) { ap = pn; r(); }

    function r() {
      const connected = [p1.on, p2.on, p3.on, p4.on];
      const count = connected.filter(Boolean).length;
      const idx = connected.indexOf(true);

      if (count === 1) {
        const pn = idx + 1;
        document.getElementById('app').innerHTML = `<div style="height:100%;display:flex;flex-direction:column" class="container">${pd(pn,'100%')}</div>`;
        at(pn); return;
      }
      if (count >= 2) {
        let html = `<div style="display:flex;gap:3px;padding:6px 12px;flex-wrap:wrap;flex-shrink:0;justify-content:center">`;
        for (let i = 0; i < 4; i++) {
          if (connected[i]) {
            const c = ['#06b6d4','#a855f7','#f59e0b','#ef4444'][i];
            html += `<button onclick="ap=${i+1};r()" style="padding:4px 12px;border-radius:8px;border:1px solid ${c}60;background:${ap===i+1?c+'30':'transparent'};color:${c};font-size:10px;font-weight:700;cursor:pointer">P${i+1}</button>`;
          }
        }
        html += `</div><div style="flex:1;display:flex;flex-direction:column;min-height:0" class="container">${pd(ap,'100%')}</div>`;
        document.getElementById('app').innerHTML = html;
        at(ap); return;
      }

      document.getElementById('app').innerHTML = `
        <div class="container">
          <div class="pair">
            <div style="width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,#6366f1,#06b6d4);display:flex;align-items:center;justify-content:center;font-size:26px;box-shadow:0 8px 24px #6366f140">🎮</div>
            <h1>SR5 Remote</h1>
            <p class="sub">SELECT PLAYER</p>
            <div class="ptabs">
              <button class="${ap===1?'s1':''}" onclick="sw(1)" style="font-size:10px">P1 ${p1.on?'✓':''}</button>
              <button class="${ap===2?'s2':''}" onclick="sw(2)" style="font-size:10px">P2 ${p2.on?'✓':''}</button>
              <button style="font-size:10px;${ap===3?'background:#f59e0b20;border-color:#f59e0b60;color:#f59e0b':''}" onclick="sw(3)">P3 ${p3.on?'✓':''}</button>
              <button style="font-size:10px;${ap===4?'background:#ef444420;border-color:#ef444460;color:#ef4444':''}" onclick="sw(4)">P4 ${p4.on?'✓':''}</button>
            </div>
            <div class="cm">
              <div class="cmq"><button style="background:${['#06b6d4','#a855f7','#f59e0b','#ef4444'][ap-1]};color:${ap===4?'#fff':'#000'}" onclick="startScan(${ap})">📷 Scan QR Code</button></div>
              <div class="cmm"><span class="lbl">MANUAL CODE</span><div class="rw"><input type="text" maxlength="6" id="mc" placeholder="ABC123" oninput="this.value=this.value.toUpperCase()"><button style="background:${['#06b6d4','#a855f7','#f59e0b','#ef4444'][ap-1]};color:${ap===4?'#fff':'#000'}" id="cmb">↵</button></div></div>
            </div>
            <p style="font-size:9px;color:#ffffff25;max-width:260px">Open SR5 Console → smartphone icon → scan QR or enter code</p>
          </div>
        </div>`;
      document.getElementById('cmb').onclick = () => { const v = document.getElementById('mc').value; if (v.length === 6) conn(ap, v); };
      document.getElementById('mc').onkeydown = (e) => { if (e.key === 'Enter') { const v = e.target.value; if (v.length === 6) conn(ap, v); } };
    }

    function pd(pn, h) {
      const p = gp(pn), cols = ['#06b6d4','#a855f7','#f59e0b','#ef4444'], c = cols[pn-1]||'#06b6d4', nm = 'P'+pn;
      const a = (b) => p.pr[b] ? 'a' : '';
      return `<div style="flex:1;display:flex;flex-direction:column;min-height:0;max-height:${h};padding:2px 0" class="container">
        <div class="header">
          <div class="status"><span class="dot on"></span><span class="tag ${pn===1?'p1':'p2'}">${nm}</span><span class="cod">${p.c}</span><span class="lat" id="lt${pn}">OK</span></div>
          <div class="tog"><button id="snd${pn}" class="${snd?'':'off'}">🔊</button><button id="vib${pn}" class="${vib?'':'off'}">📳</button><button class="red" onclick="disc(${pn})">⏻</button></div>
        </div>
        <div class="pad">
          <div class="sh"><button id="L1_${pn}" class="${a('L1')}">L1</button><button id="R1_${pn}" class="${a('R1')}">R1</button></div>
          <div class="mid">
            <div class="dpad"><div class="dpad-c"></div>
              <button class="dpad-btn dpad-up ${a('UP')}" id="UP_${pn}">▲</button>
              <button class="dpad-btn dpad-down ${a('DOWN')}" id="DOWN_${pn}">▼</button>
              <button class="dpad-btn dpad-left ${a('LEFT')}" id="LEFT_${pn}">◀</button>
              <button class="dpad-btn dpad-right ${a('RIGHT')}" id="RIGHT_${pn}">▶</button>
            </div>
            <div class="act">
              <button class="act-btn by ${a('Y')}" id="Y_${pn}">Y</button>
              <button class="act-btn bx ${a('X')}" id="X_${pn}">X</button>
              <button class="act-btn bb ${a('B')}" id="B_${pn}">B</button>
              <button class="act-btn ba ${a('A')}" id="A_${pn}">A</button>
            </div>
          </div>
        </div>
        <div class="bot"><div><button id="SELECT_${pn}" class="${a('SELECT')}"></button><span>SELECT</span></div><div><button id="START_${pn}" class="${a('START')}"></button><span>START</span></div></div>
      </div>`;
    }

    function at(pn) {
      ['UP','DOWN','LEFT','RIGHT','A','B','X','Y','SELECT','START','L1','R1'].forEach(b => { const el = document.getElementById(b+'_'+pn); if (el) Object.assign(el, tp(pn, b)); });
      const sb = document.getElementById('snd'+pn); if (sb) sb.onclick = () => { snd = !snd; r(); };
      const vb = document.getElementById('vib'+pn); if (vb) vb.onclick = () => { vib = !vib; r(); };
    }

    const p = new URLSearchParams(location.search), uc = p.get('code');
    if (uc && uc.length === 6) conn(1, uc); else r();
  </script>
</body>
</html>
