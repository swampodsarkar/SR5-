<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
        #game-container { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .info { position: absolute; top: 20px; right: 20px; color: rgba(255,255,255,0.7); background: rgba(0,0,0,0.5); padding: 8px 12px; border-radius: 8px; font-size: 13px; z-index: 9999; pointer-events: none; border: 1px solid rgba(255,255,255,0.1); }
    </style>
    <script>
      document.addEventListener('contextmenu', event => event.preventDefault());
      document.addEventListener('keydown', function (e) {
        if (e.key === 'F12' || e.keyCode === 123) { e.preventDefault(); }
        if ((e.ctrlKey || e.metaKey) && e.shiftKey && (e.key === 'I' || e.key === 'i' || e.key === 'J' || e.key === 'j' || e.key === 'C' || e.key === 'c')) { e.preventDefault(); }
        if ((e.ctrlKey || e.metaKey) && (e.key === 'U' || e.key === 'u' || e.key === 'S' || e.key === 's')) { e.preventDefault(); }
      });
    </script>
</head>
<body>
    <div id="info" class="info"></div>
    <div id="game-container"></div>
    <script>
        // Button map: button name -> standard gamepad button index (Xbox layout: A=0, B=1, X=2, Y=3)
        const MAP = { "UP": 12, "DOWN": 13, "LEFT": 14, "RIGHT": 15, "A": 0, "B": 1, "X": 2, "Y": 3, "SELECT": 8, "START": 9, "L1": 4, "R1": 5 };

        // Debug overlay
        const debugDiv = document.createElement('div');
        debugDiv.id = 'debug';
        debugDiv.style.cssText = 'position:fixed;bottom:10px;left:10px;z-index:99999;color:#0f0;font:10px monospace;background:rgba(0,0,0,0.8);padding:6px 10px;border-radius:6px;pointer-events:none;max-width:90%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap';
        document.body.appendChild(debugDiv);
        function dbg(m) { debugDiv.textContent = m; }

        // 4 player button states
        const players = [{}, {}, {}, {}];

        function buildGamepad(index) {
            const btns = [];
            for (let b = 0; b < 18; b++) btns.push({ pressed: false, value: 0, touched: false });
            for (const k in players[index]) {
                if (MAP[k] !== undefined) {
                    const down = players[index][k] === 'down';
                    btns[MAP[k]] = { pressed: down, value: down ? 1.0 : 0, touched: down };
                }
            }
            // Show active buttons for all players
            let active = '';
            for (let p = 0; p < 4; p++) {
                const a = Object.entries(players[p]).filter(([,v]) => v === 'down').map(([k]) => k).join(',');
                if (a) active += `P${p+1}:${a} `;
            }
            dbg(active || 'Waiting for input...');
            return {
                id: "Virtual SR5 Player " + (index + 1),
                index: index,
                connected: true,
                timestamp: performance.now(),
                mapping: "standard",
                axes: [0, 0, 0, 0],
                buttons: btns
            };
        }

        // Always return 4 gamepad slots for 4 players
        const origGetGamepads = navigator.getGamepads ? navigator.getGamepads.bind(navigator) : () => [null, null, null, null];
        navigator.getGamepads = function () {
            return [
                buildGamepad(0),
                buildGamepad(1),
                buildGamepad(2),
                buildGamepad(3)
            ];
        };

        // Listen for gamepad updates from React app (via postMessage)
        window.addEventListener('message', function (e) {
            if (e.data && e.data.type === 'GAMEPAD_UPDATE') {
                const p = e.data.player;
                if (p >= 0 && p <= 3) {
                    players[p][e.data.button] = e.data.state;
                    dbg(`P${p+1} ${e.data.button}=${e.data.state}`);
                }
            }
        });

        const params = new URLSearchParams(window.location.search);
        const core = params.get('core') || 'nes';
        const url = params.get('url') || '';

        document.getElementById('info').innerText = `Load any ${core.toUpperCase()} ROM using the emulator interface`;

        window.EJS_player = '#game-container';
        window.EJS_core = core;
        window.EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';
        window.EJS_color = '#ffffff';

        if (url && url !== 'undefined' && url !== 'null') {
            if (url.startsWith('http')) {
                const isGitHubRaw = url.includes('raw.githubusercontent.com') || url.includes('githubusercontent.com');
                if (isGitHubRaw) {
                    window.EJS_gameUrl = url;
                } else {
                    // Try multiple CORS proxies
                    const proxies = ['https://corsproxy.io/?url=', 'https://api.allorigins.win/raw?url=', 'https://corsproxy.vercel.app/api?url='];
                    window.EJS_gameUrl = proxies[0] + encodeURIComponent(url);
                    // Save the URL so React can retry with different proxies if this one fails
                    window.__EJS_rawUrl = url;
                    window.__EJS_proxies = proxies;
                }
            } else {
                window.EJS_gameUrl = url;
            }
            window.EJS_startOnLoaded = true;
        }

        // Retry with next CORS proxy if the first fails
        window.EJS_onGameStart = function() {
            document.getElementById('info').innerText = '';
        };
        setTimeout(function checkLoad() {
            const el = document.querySelector('.EJS_menu_player, .ejs_player');
            if (el) {
                const text = el.textContent || el.innerText || '';
                if (text.includes('404') || text.includes('Error') || text.includes('Failed')) {
                    if (window.__EJS_rawUrl && window.__EJS_proxies) {
                        const idx = window.__EJS_proxies.indexOf(window.EJS_gameUrl.replace('?url=', '').replace('?url=', ''));
                        if (idx >= 0 && idx < window.__EJS_proxies.length - 1) {
                            window.EJS_gameUrl = window.__EJS_proxies[idx + 1] + encodeURIComponent(window.__EJS_rawUrl);
                            location.reload();
                        }
                    }
                }
            }
        }, 15000);
    </script>
    <script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>
</body>
</html>
